name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install --ignore-scripts
      - run: npm run build
      - run: npm publish --access public --provenance
        working-directory: packages/overlay
      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ "$PREV_TAG" = "${{ github.ref_name }}" ]; then
            echo "Initial release" > /tmp/release-notes.md
          else
            git log "${PREV_TAG}..${{ github.ref_name }}" --pretty=format:"- %s" --no-merges | grep -v "Co-Authored-By" > /tmp/release-notes.md
          fi
      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}
