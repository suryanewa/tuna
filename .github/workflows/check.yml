name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  overlay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run typecheck
      - run: npm run build:overlay
      - run: npm run build:extension
      - run: npm run build:playground
      - run: npm test
